$kind: http-request
name: Filter Posts by User
method: GET
url: '{{base_url}}/posts'
order: 4000
queryParams:
  - key: userId
    value: '1'
    description: Filter posts to only show those created by user with ID 1
description: |-
  Fetches posts filtered by a specific user ID using query parameters.
  
  Query parameters are added after a ? in the URL and allow you to filter, sort, or paginate results:
  - /posts?userId=1 → only posts by user 1
  
  Try changing the userId value to see posts from different users (1-10 are valid user IDs).
  
  Query parameters are key-value pairs separated by & for multiple parameters:
  - /posts?userId=1&_limit=5 → first 5 posts by user 1
